name: Build CoolProp binaries

on:
  workflow_dispatch:
    inputs:
      coolprop_version:
        required: true
        description: "CoolProp version"
        default: "v7.2.0"

jobs:
  build-coolprop-binaries:
    name: ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: ubuntu-latest
            label: linux-x86-64
          - os: macos-latest
            label: macos-aarch64
          - os: macos-15-intel
            label: macos-x86-64
          - os: windows-11-arm
            label: windows-aarch64
          - os: windows-latest
            label: windows-x86-64

    steps:
      - name: Checkout CoolProp repository
        uses: actions/checkout@v7
        with:
          repository: CoolProp/CoolProp
          ref: ${{ github.event.inputs.coolprop_version }}
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Restore Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install six
      - name: Build a Makefile
        run: cmake . -DCOOLPROP_SHARED_LIBRARY=ON -DCMAKE_BUILD_TYPE=Release -DFORCE_BITNESS_NATIVE=ON
      - name: Build CoolProp binaries
        run: cmake --build . --config Release
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: CoolProp ${{ github.event.inputs.coolprop_version }} (${{ matrix.platform.label }})
          path: |
            Release/*.dll
            Release/*.lib
            *.dylib
            *.so
          if-no-files-found: error
